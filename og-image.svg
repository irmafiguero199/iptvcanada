<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0c0c14"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e676;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="#00e676"/>

  <!-- Glow blob background -->
  <ellipse cx="300" cy="315" rx="350" ry="250" fill="#00e676" opacity="0.05"/>
  <ellipse cx="900" cy="315" rx="300" ry="200" fill="#00e5ff" opacity="0.05"/>

  <!-- Logo box -->
  <rect x="80" y="60" width="64" height="64" rx="14" fill="#0a0a0f"/>
  <rect x="80" y="60" width="64" height="64" rx="14" fill="#00e676" opacity="0.15"/>
  <text x="112" y="104" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#00e676" text-anchor="middle">N</text>
  <circle cx="130" cy="74" r="6" fill="#00e676"/>
  <circle cx="130" cy="74" r="3" fill="#0a0a0f"/>

  <!-- Brand name -->
  <text x="160" y="100" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#ffffff">NorthStream</text>

  <!-- Main headline -->
  <text x="80" y="220" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#ffffff">BEST IPTV</text>
  <text x="80" y="300" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#00e676">CANADA 2026</text>

  <!-- Subheadline -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.75)">25,000+ Channels · 4K · CBC · TSN · RDS · From $12.99 CAD</text>

  <!-- Rating badge -->
  <rect x="80" y="420" width="220" height="56" rx="12" fill="#00e676" opacity="0.15"/>
  <rect x="80" y="420" width="220" height="56" rx="12" fill="none" stroke="#00e676" stroke-width="1.5"/>
  <text x="190" y="455" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#00e676" text-anchor="middle">⭐ 4.9 / 5</text>
  <text x="190" y="468" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">1,247 reviews</text>

  <!-- Free trial badge -->
  <rect x="320" y="420" width="240" height="56" rx="12" fill="#f0c040" opacity="0.15"/>
  <rect x="320" y="420" width="240" height="56" rx="12" fill="none" stroke="#f0c040" stroke-width="1.5"/>
  <text x="440" y="451" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#f0c040" text-anchor="middle">FREE 24H TRIAL</text>
  <text x="440" y="468" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">No credit card required</text>

  <!-- Right side channels list -->
  <text x="900" y="200" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle">INCLUDES</text>
  <text x="900" y="250" font-family="Arial Black, sans-serif" font-size="26" fill="#ffffff" text-anchor="middle">CBC · CTV · Global</text>
  <text x="900" y="290" font-family="Arial Black, sans-serif" font-size="26" fill="#00e676" text-anchor="middle">TSN · Sportsnet · RDS</text>
  <text x="900" y="330" font-family="Arial Black, sans-serif" font-size="26" fill="#ffffff" text-anchor="middle">TVA · ICI Radio-Canada</text>
  <text x="900" y="380" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">+ 25,000 more channels</text>

  <!-- Bottom domain -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">amslerfamilyfondation.org</text>
</svg>
